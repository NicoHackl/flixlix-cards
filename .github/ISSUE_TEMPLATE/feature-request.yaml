name: "💡 Feature Request"
description: "Suggest an idea for a card"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: checkboxes
    id: troubleshooting
    attributes:
      label: Troubleshooting
      options:
        - label: I have searched the existing issues to make sure this is not a duplicate.
          required: true
        - label: I am running the latest version of the card.
          required: true
  - type: dropdown
    id: package
    attributes:
      label: "Which card is this for?"
      options:
        - Power Flow Card Plus
        - Energy Flow Card Plus
        - Energy Period Selector Plus
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
  - type: textarea
    id: context
    attributes:
      label: "Additional context"
      description: "Add any other context or screenshots about the feature request here."