name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT to ensure the push triggers follow-up actions if needed
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Versioning (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          # We only want to tag, not publish to NPM
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Distribution Repositories
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          # 1. Push the tags created by 'changeset tag' back to the monorepo
          # This ensures the local runner and GitHub server are in sync
          git push origin --tags

          # 2. Get the list of all tags pointing to the current commit
          # We'll try two methods to be extra safe
          NEW_TAGS=$(git tag --points-at HEAD)
          
          if [ -z "$NEW_TAGS" ]; then
            echo "ℹ️ No new package tags detected in this commit. Checking for recently created tags..."
            # Fallback: look at tags created in the last 2 minutes as a safety net
            NEW_TAGS=$(git for-each-ref --format='%(refname:short)' --sort=-taggerdate refs/tags | head -n 5)
          fi

          echo "✅ Processing tags: $NEW_TAGS"

          for TAG in $NEW_TAGS; do
            # Ensure the tag actually belongs to a package (format: name@version)
            if [[ "$TAG" != *"@"* ]]; then continue; fi
            
            # Extract Name and Version (Robust regex)
            VERSION=$(echo $TAG | grep -oE '[0-9]+\.[0-9]+\.[0-9]+.*$')
            FULL_NAME=${TAG%@$VERSION}
            # Remove scope (e.g. @flixlix/card -> card)
            CLEAN_NAME=$(echo $FULL_NAME | sed 's|^@.*/||')
            
            PKG_PATH="packages/flixlix-cards/${CLEAN_NAME}"
            
            if [ ! -d "$PKG_PATH" ]; then
              echo "⏭️ Skipping $TAG (Path $PKG_PATH not found)"
              continue
            fi

            echo "🛠 Building $CLEAN_NAME v$VERSION..."
            pnpm --filter "$FULL_NAME" build

            echo "📦 Syncing to flixlix/${CLEAN_NAME}..."
            rm -rf dist-repo
            git clone "https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git" dist-repo
            
            # Use -f to force overwrite
            cp -f "${PKG_PATH}/dist/${CLEAN_NAME}.js" dist-repo/
            cp -f "${PKG_PATH}/hacs.json" dist-repo/
            cp -f "${PKG_PATH}/README.md" dist-repo/
            cp -f "${PKG_PATH}/CHANGELOG.md" dist-repo/ || true

            cd dist-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            
            if ! git diff-index --quiet HEAD; then
              git commit -m "Release v${VERSION}"
              git tag -a "v${VERSION}" -m "Release v${VERSION}"
              git push origin main --tags --force
              
              gh release create "v${VERSION}" "${CLEAN_NAME}.js" \
                --repo "flixlix/${CLEAN_NAME}" \
                --title "v${VERSION}" \
                --notes "Automated release. See [flixlix-cards](https://github.com/flixlix/flixlix-cards) for full source."
              echo "🚀 Successfully released $CLEAN_NAME v$VERSION"
            else
              echo "✅ No changes needed for $CLEAN_NAME. Repo is already at v$VERSION."
            fi
            
            cd ..
            rm -rf dist-repo
          done