name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT to ensure the push triggers follow-up actions if needed
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Versioning (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Distribution Repositories
        # Only run if we are NOT in a PR phase (no changesets left)
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          # 1. Identify what was tagged in this specific commit
          # Changesets created these tags in the previous step
          NEW_TAGS=$(git tag --points-at HEAD)
          
          if [ -z "$NEW_TAGS" ]; then
            echo "ℹ️ No new package tags detected. Nothing to sync."
            exit 0
          fi

          echo "✅ Found tags to sync: $NEW_TAGS"

          for TAG in $NEW_TAGS; do
            # Expected format: @scope/package-name@version OR package-name@version
            if [[ "$TAG" != *"@"* ]]; then continue; fi
            
            # Extract Name and Version
            # This handles both scoped (@flixlix/card) and unscoped (card) names
            VERSION=$(echo $TAG | grep -oE '[0-9]+\.[0-9]+\.[0-9]+.*$')
            FULL_NAME=${TAG%@$VERSION}
            CLEAN_NAME=$(echo $FULL_NAME | sed 's|^@.*/||')
            
            # 2. Path Validation
            # IMPORTANT: Matches your nested structure: packages/flixlix-cards/[name]
            PKG_PATH="packages/flixlix-cards/${CLEAN_NAME}"
            
            if [ ! -d "$PKG_PATH" ]; then
              echo "⚠️ Warning: Folder $PKG_PATH not found. Skipping $CLEAN_NAME."
              continue
            fi

            echo "🛠 Processing $CLEAN_NAME (v$VERSION)..."

            # 3. Build the specific package
            pnpm --filter "$FULL_NAME" build

            # 4. Prepare Distribution Repository
            echo "📦 Syncing to flixlix/${CLEAN_NAME}..."
            rm -rf dist-repo
            git clone "https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git" dist-repo
            
            # 5. Atomic File Sync
            # We copy only necessary files. If build output name differs, adjust here.
            cp "${PKG_PATH}/dist/${CLEAN_NAME}.js" dist-repo/ || echo "❌ Build artifact not found!"
            cp "${PKG_PATH}/hacs.json" dist-repo/
            cp "${PKG_PATH}/README.md" dist-repo/
            cp "${PKG_PATH}/CHANGELOG.md" dist-repo/ || true

            # 6. Push Changes & Release
            cd dist-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            
            # Only proceed if files actually changed
            if ! git diff-index --quiet HEAD; then
              git commit -m "Release v${VERSION}"
              git tag -a "v${VERSION}" -m "Release v${VERSION}"
              git push origin main --tags --force
              
              # Create GitHub Release with the JS asset attached
              gh release create "v${VERSION}" "${CLEAN_NAME}.js" \
                --repo "flixlix/${CLEAN_NAME}" \
                --title "v${VERSION}" \
                --notes "Automated release from monorepo. See [flixlix-cards](https://github.com/flixlix/flixlix-cards) for full source."
              echo "🚀 Successfully released $CLEAN_NAME v$VERSION"
            else
              echo "idempotent: No changes detected for $CLEAN_NAME. Repo is already up to date."
            fi
            
            cd ..
            rm -rf dist-repo
          done